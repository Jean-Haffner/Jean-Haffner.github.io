<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Average Frequency-Tables</title>
<link rel="icon" href="assets/favicon.png" type="image/png">
<link rel="stylesheet" href="css/styles.css">

<style>
.container {
  max-width: 960px;
  margin: 24px auto;
  padding: 2rem;
  background: rgba(26, 26, 26, 0.95);
  border-radius: 8px;
}
h2 {
  border-bottom: 2px solid #6ab534;
  display: inline-block;
  margin-bottom: 1.5rem;
  color: #f4f4f4;
}
.form-row {
  margin: 1rem 0;
}
label {
  display: inline-block;
  margin-right: 0.5rem;
  color: #bbb;
  font-weight: 500;
}
input[type="file"],
select {
  background: #111;
  color: #f4f4f4;
  border: 1px solid #333;
  padding: 0.5rem;
  border-radius: 4px;
  font-family: 'Montserrat', sans-serif;
}
button {
  background: #ffcc00;
  color: #0a0a0a;
  padding: 0.6rem 1.5rem;
  border: none;
  border-radius: 20px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.3s, color 0.3s;
  font-family: 'Montserrat', sans-serif;
  margin-top: 1rem;
}
button:hover {
  background: #e6b800;
  color: #ffffff;
}
button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
#status {
  margin-top: 1rem;
  color: #bbb;
  font-style: italic;
}
canvas {
  image-rendering: pixelated;
  border: 1px solid #333;
  margin-top: 12px;
  display: block;
  max-width: 100%;
}
.downloads {
  display: flex;
  gap: 12px;
  margin-top: 1.5rem;
  flex-wrap: wrap;
}
.downloads {
  display: flex;
  gap: 12px;
  margin-top: 1.5rem;
  flex-wrap: wrap;
}
a.download {
  padding: 0.6rem 1.5rem;
  background: #6ab534;
  color: #0a0a0a;
  border-radius: 20px;
  text-decoration: none;
  font-weight: 600;
  transition: background 0.3s, color 0.3s;
}
a.download:hover {
  background: #aaaaaa;
  color: #ffffff;
}
</style>
</head>

<body>
<div class="container">
<h2>Average Frequency-Tables</h2>

<div class="form-row">
  <label>Select TXT Files:</label>
  <input type="file" id="files" multiple accept=".txt"/>
</div>

<div class="form-row">
  <label for="colormap">Colour map:</label>
  <select id="colormap">
    <option value="grey">Greyscale</option>
    <option value="izotope">Cyan → Orange</option>
    <option value="stylized" selected>Black & Green</option>
  </select>
</div>

<button id="process" disabled>Average Files</button>

<div id="status"></div>
<div id="canvasWrap"></div>
</div>

<script>
/* ---------- identical colour maps ---------- */
const colormaps = {
  grey: v => [v, v, v],
  izotope: v => {
    if (v < 0.2) { const t = v / 0.2; return [0, 0, t * 0.3]; }
    else if (v < 0.4) { const t = (v - 0.2) / 0.2; return [t * 0.4, t * 0.15, 0.3 - t * 0.3]; }
    else if (v < 0.6) { const t = (v - 0.4) / 0.2; return [0.4 + t * 0.6, 0.15 + t * 0.35, 0]; }
    else if (v < 0.8) { const t = (v - 0.6) / 0.2; return [1, 0.5 + t * 0.5, 0]; }
    else { const t = (v - 0.8) / 0.2; return [1, 1, t]; }
  },
  stylized: v => {
    if (v < 0.33) { const t = v / 0.33; return [0, t * 0.3, 0]; }
    else if (v < 0.66) { const t = (v - 0.33) / 0.33; return [0, 0.3 + t * 0.5, 0]; }
    else { const t = (v - 0.66) / 0.34; return [t, 0.8 + t * 0.2, t]; }
  }
};

const filesInput = document.getElementById("files");
const processBtn = document.getElementById("process");
const status = document.getElementById("status");
const wrap = document.getElementById("canvasWrap");
const cmapSel = document.getElementById("colormap");

filesInput.addEventListener("change", () => {
  processBtn.disabled = filesInput.files.length < 2;
});

processBtn.addEventListener("click", async () => {
  const files = [...filesInput.files];
  if (files.length < 2) return;

  status.textContent = "Reading files…";
  wrap.innerHTML = "";

  const acc = new Map();

  for (const file of files) {
    const text = await file.text();
    for (const line of text.split(/\r?\n/)) {
      if (!line || line.startsWith("_") || line.toLowerCase().startsWith("frequency")) continue;
      const [hzStr, dbStr] = line.split("|");
      const hz = Math.round(parseFloat(hzStr));
      const db = parseFloat(dbStr);
      if (!Number.isFinite(hz) || !Number.isFinite(db)) continue;

      const mag = Math.pow(10, db / 20);
      if (!acc.has(hz)) acc.set(hz, []);
      acc.get(hz).push(mag);
    }
  }

  status.textContent = "Averaging…";

  const freqs = [...acc.keys()].sort((a,b)=>a-b);
  const mags = freqs.map(hz => {
    const v = acc.get(hz);
    return v.reduce((a,b)=>a+b,0) / v.length;
  });

  const maxMag = Math.max(...mags);
  const dbVals = mags.map(m => 20 * Math.log10(m / maxMag));

  /* ---------- internal 1px PNG ---------- */
  const nyquist = freqs[freqs.length - 1];
  const base = document.createElement("canvas");
  base.width = 1;
  base.height = nyquist + 1;

  const bctx = base.getContext("2d");
  const img = bctx.createImageData(1, base.height);
  const cmap = colormaps[cmapSel.value];

  for (let y = 0; y <= nyquist; y++) {
    const idx = (nyquist - y) * 4;
    const i = freqs.indexOf(y);
    const db = i >= 0 ? dbVals[i] : -120;
    const v = Math.max(0, Math.min(1, (db + 120) / 120));
    const [r,g,b] = cmap(v);

    img.data[idx]     = Math.round(255 * r);
    img.data[idx + 1] = Math.round(255 * g);
    img.data[idx + 2] = Math.round(255 * b);
    img.data[idx + 3] = 255;
  }
  bctx.putImageData(img, 0, 0);

  /* ---------- stretched display ---------- */
  const vis = document.createElement("canvas");
  vis.width = wrap.clientWidth || 900;
  vis.height = Math.min(base.height, 500);

  const vctx = vis.getContext("2d");
  vctx.imageSmoothingEnabled = false;
  vctx.drawImage(base, 0, 0, vis.width, vis.height);

  wrap.appendChild(vis);

  /* ---------- auto-download TXT ---------- */
  let txt = "Frequency (Hz)\t|\tGain (dB)\n";
  txt += "_".repeat(40) + "\n";
  freqs.forEach((hz, i) => {
    txt += `${hz.toFixed(6)}\t|\t${dbVals[i].toFixed(6)}\n`;
  });

  const txtBlob = new Blob([txt], {type:"text/plain"});
  const txtA = document.createElement("a");
  txtA.href = URL.createObjectURL(txtBlob);
  txtA.download = `combined_average_(${files.length}-files).txt`;
  txtA.click();

  status.textContent = `Done. Files combined: ${files.length}`;
});
</script>
</body>
</html>
