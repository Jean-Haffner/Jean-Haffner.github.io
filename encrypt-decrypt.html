<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>TIFS File Converter</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap');

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Montserrat', sans-serif;
  background: #0a0a0a;
  color: #f4f4f4;
  min-height: 100vh;
  padding: 20px;
}

.container {
  max-width: 960px;
  margin: 24px auto;
  padding: 2rem;
  background: rgba(26, 26, 26, 0.95);
  border-radius: 8px;
}

h2 {
  border-bottom: 2px solid #6ab534;
  display: inline-block;
  margin-bottom: 1.5rem;
  color: #f4f4f4;
}

.form-row {
  margin: 1rem 0;
}

label {
  display: inline-block;
  margin-right: 0.5rem;
  color: #bbb;
  font-weight: 500;
}

input[type="file"] {
  background: #111;
  color: #f4f4f4;
  border: 1px solid #333;
  padding: 0.5rem;
  border-radius: 4px;
  font-family: 'Montserrat', sans-serif;
  width: 100%;
  max-width: 400px;
}

button {
  background: #ffcc00;
  color: #0a0a0a;
  padding: 0.6rem 1.5rem;
  border: none;
  border-radius: 20px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.3s, color 0.3s;
  font-family: 'Montserrat', sans-serif;
  margin-top: 1rem;
}

button:hover {
  background: #e6b800;
  color: #ffffff;
}

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

#status {
  margin-top: 1rem;
  color: #bbb;
  font-style: italic;
  min-height: 1.5rem;
}

.stats {
  margin-top: 1.5rem;
  padding: 1rem;
  background: #111;
  border-radius: 4px;
  color: #6ab534;
}

.error {
  color: #ff4444 !important;
}

.success {
  color: #6ab534 !important;
}

p {
  color: #999;
  font-size: 0.9rem;
  text-align: center;
  margin-top: 2rem;
}
</style>
</head>

<body>
<div class="container">
<h2>TIFS File Converter</h2>

<div class="form-row">
  <label>Select File (.txt or .tifs):</label>
  <input type="file" id="fileInput" accept=".txt,.tifs"/>
</div>

<button id="processBtn" disabled>Convert File</button>

<div id="status"></div>
<div id="stats" class="stats" style="display:none;"></div>

<p id="credits">&copy; <span id="year"></span> Jean Haffner. All rights reserved.</p>
</div>

<script>
document.getElementById("year").textContent = new Date().getFullYear();

const fileInput = document.getElementById("fileInput");
const processBtn = document.getElementById("processBtn");
const status = document.getElementById("status");
const statsDiv = document.getElementById("stats");

fileInput.addEventListener("change", () => {
  processBtn.disabled = !fileInput.files.length;
  status.textContent = "";
  statsDiv.style.display = "none";
});

// State evolution functions
function evolve(n) {
  n = (n * 25 + 102803) % 236196;
  n = (n * 9301 + 49297) % 233280;
  return n;
}

function transform(data) {
  let N = 0xD1C2B3A4;
  const result = new Uint8Array(data.length);
  
  for (let i = 0; i < data.length; i++) {
    N = evolve(N);
    const k = N & 0xFF;
    result[i] = data[i] ^ k;
  }
  
  return result;
}

function encodeTIFS(txtData) {
  const transformed = transform(txtData);
  
  // Create TIFS file: "TIFS" + version(1 byte) + size(4 bytes) + data
  const header = new Uint8Array([
    0x54, 0x49, 0x46, 0x53,  // "TIFS"
    0x01,                      // version
  ]);
  
  // Size as 4-byte little-endian
  const size = new Uint8Array(4);
  const view = new DataView(size.buffer);
  view.setUint32(0, transformed.length, true);
  
  // Combine all parts
  const result = new Uint8Array(header.length + size.length + transformed.length);
  result.set(header, 0);
  result.set(size, header.length);
  result.set(transformed, header.length + size.length);
  
  return result;
}

function decodeTIFS(tifsData) {
  // Validate header
  if (tifsData.length < 9) {
    throw new Error("File too short to be valid TIFS");
  }
  
  if (tifsData[0] !== 0x54 || tifsData[1] !== 0x49 || 
      tifsData[2] !== 0x46 || tifsData[3] !== 0x53) {
    throw new Error("Invalid TIFS header");
  }
  
  const version = tifsData[4];
  if (version !== 0x01) {
    throw new Error(`Unsupported TIFS version: ${version}`);
  }
  
  // Read size
  const view = new DataView(tifsData.buffer, tifsData.byteOffset + 5, 4);
  const size = view.getUint32(0, true);
  
  if (tifsData.length !== 9 + size) {
    throw new Error(`Size mismatch: header says ${size}, got ${tifsData.length - 9}`);
  }
  
  // Extract and transform payload
  const payload = tifsData.slice(9);
  return transform(payload);
}

processBtn.addEventListener("click", async () => {
  const file = fileInput.files[0];
  if (!file) return;

  status.textContent = "Processing file…";
  status.className = "";
  statsDiv.style.display = "none";

  try {
    const arrayBuffer = await file.arrayBuffer();
    const data = new Uint8Array(arrayBuffer);
    
    const isTIFS = file.name.toLowerCase().endsWith('.tifs');
    let result, outputName, operation;
    
    if (isTIFS) {
      // Decrypt TIFS → TXT
      result = decodeTIFS(data);
      outputName = file.name.replace(/\.tifs$/i, '.txt');
      operation = "Decrypted";
    } else {
      // Encrypt TXT → TIFS
      result = encodeTIFS(data);
      outputName = file.name.replace(/\.txt$/i, '') + '.tifs';
      operation = "Encrypted";
    }
    
    // Download result
    const blob = new Blob([result], { type: "application/octet-stream" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = outputName;
    a.click();
    URL.revokeObjectURL(url);
    
    status.textContent = `${operation} successfully`;
    status.className = "success";
    statsDiv.style.display = "block";
    statsDiv.innerHTML = `
      <strong>Conversion complete</strong><br>
      Operation: ${operation}<br>
      Input size: ${data.length} bytes<br>
      Output size: ${result.length} bytes<br>
      Output file: ${outputName}
    `;
  } catch (err) {
    status.textContent = `Error: ${err.message}`;
    status.className = "error";
    console.error(err);
  }
});
</script>
</body>
</html>
