<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Smooth Frequency-Table</title>
<link rel="icon" href="assets/favicon.png" type="image/png">
<link rel="stylesheet" href="css/styles.css">
<style>
.container {
  max-width: 960px;
  margin: 24px auto;
  padding: 2rem;
  background: rgba(26, 26, 26, 0.95);
  border-radius: 8px;
}
h2 {
  border-bottom: 2px solid #6ab534;
  display: inline-block;
  margin-bottom: 1.5rem;
  color: #f4f4f4;
}
.form-row {
  margin: 1rem 0;
}
label {
  display: inline-block;
  margin-right: 0.5rem;
  color: #bbb;
  font-weight: 500;
}
input[type="file"],
select {
  background: #111;
  color: #f4f4f4;
  border: 1px solid #333;
  padding: 0.5rem;
  border-radius: 4px;
  font-family: 'Montserrat', sans-serif;
}
button {
  background: #ffcc00;
  color: #0a0a0a;
  padding: 0.6rem 1.5rem;
  border: none;
  border-radius: 20px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.3s, color 0.3s;
  font-family: 'Montserrat', sans-serif;
  margin-top: 1rem;
}
button:hover {
  background: #e6b800;
  color: #ffffff;
}
button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
#status {
  margin-top: 1rem;
  color: #bbb;
  font-style: italic;
}
.stats {
  margin-top: 1.5rem;
  padding: 1rem;
  background: #111;
  border-radius: 4px;
  color: #6ab534;
}
canvas {
  image-rendering: pixelated;
  border: 1px solid #333;
  margin-top: 12px;
  display: block;
  max-width: 100%;
}
#canvasWrap {
  margin-top: 1.5rem;
}
p {
  color: #999;
  font-size: 0.9rem;
  text-align: center;
  margin-top: 2rem;
}
</style>
</head>

<body>
<div class="container">
<h2>Smooth Frequency-Table</h2>

<div class="form-row">
  <label>Select TXT File:</label>
  <input type="file" id="fileInput" accept=".txt"/>
</div>

<div class="form-row">
  <label for="colormap">Colour map:</label>
  <select id="colormap">
    <option value="grey">Greyscale</option>
    <option value="izotope">Cyan → Orange</option>
    <option value="stylized" selected>Black & Green</option>
  </select>
</div>

<button id="processBtn" disabled>Smooth Table</button>

<div id="status"></div>
<div id="stats" class="stats" style="display:none;"></div>
<div id="canvasWrap"></div>

<p id="credits">&copy; <span id="year"></span> Jean Haffner. All rights reserved.</p>
</div>

<script>
document.getElementById("year").textContent = new Date().getFullYear();

const colormaps = {
  grey: v => [v, v, v],
  izotope: v => {
    if (v < 0.2) { const t = v / 0.2; return [0, 0, t * 0.3]; }
    else if (v < 0.4) { const t = (v - 0.2) / 0.2; return [t * 0.4, t * 0.15, 0.3 - t * 0.3]; }
    else if (v < 0.6) { const t = (v - 0.4) / 0.2; return [0.4 + t * 0.6, 0.15 + t * 0.35, 0]; }
    else if (v < 0.8) { const t = (v - 0.6) / 0.2; return [1, 0.5 + t * 0.5, 0]; }
    else { const t = (v - 0.8) / 0.2; return [1, 1, t]; }
  },
  stylized: v => {
    if (v < 0.33) { const t = v / 0.33; return [0, t * 0.3, 0]; }
    else if (v < 0.66) { const t = (v - 0.33) / 0.33; return [0, 0.3 + t * 0.5, 0]; }
    else { const t = (v - 0.66) / 0.34; return [t, 0.8 + t * 0.2, t]; }
  }
};

const fileInput = document.getElementById("fileInput");
const processBtn = document.getElementById("processBtn");
const status = document.getElementById("status");
const statsDiv = document.getElementById("stats");
const wrap = document.getElementById("canvasWrap");
const cmapSel = document.getElementById("colormap");

fileInput.addEventListener("change", () => {
  processBtn.disabled = !fileInput.files.length;
});

processBtn.addEventListener("click", async () => {
  const file = fileInput.files[0];
  if (!file) return;

  status.textContent = "Reading file…";
  statsDiv.style.display = "none";
  wrap.innerHTML = "";

  const text = await file.text();
  const data = [];

  for (const line of text.split(/\r?\n/)) {
    if (!line || line.startsWith("_") || line.toLowerCase().startsWith("frequency")) continue;
    const parts = line.split(/\t?\|\t?/);
    if (parts.length < 2) continue;
    
    const hz = parseFloat(parts[0]);
    const db = parseFloat(parts[1]);
    if (!Number.isFinite(hz) || !Number.isFinite(db)) continue;
    
    data.push({ hz, db });
  }

  if (data.length < 3) {
    status.textContent = "Error: Need at least 3 data points";
    return;
  }

  status.textContent = "Smoothing outliers…";

  const result = [...data];
  let totalSmoothed = 0;
  let iterations = 0;

  // Repeat smoothing until no more outliers found
  while (true) {
    let smoothed = 0;
    iterations++;

    // Check 4-point patterns first (only above 100Hz)
    for (let i = 1; i < result.length - 2; i++) {
      const hz = result[i].hz;
      
      if (hz > 100) {
        const a = result[i - 1].db;
        const b = result[i].db;
        const c = result[i + 1].db;
        const d = result[i + 2].db;

        if ((b < a && c < a && b < d && c < d) || (b > a && c > a && b > d && c > d)) {
          result[i].db = 0.75 * a + 0.25 * d;
          result[i + 1].db = 0.25 * a + 0.75 * d;
          smoothed += 2;
          i++;
        }
      }
    }

    // Check 3-point patterns
    for (let i = 1; i < result.length - 1; i++) {
      const a = result[i - 1].db;
      const b = result[i].db;
      const c = result[i + 1].db;

      if ((b < a && b < c) || (b > a && b > c)) {
        result[i].db = (a + c) / 2;
        smoothed++;
      }
    }

    totalSmoothed += smoothed;
    if (smoothed === 0) break;

    status.textContent = `Smoothing iteration ${iterations}… (${smoothed} points)`;
  }

  // Generate output text
  let txt = "Frequency (Hz)\t|\tGain (dB)\n";
  txt += "_".repeat(40) + "\n";
  result.forEach(({ hz, db }) => {
    txt += `${hz.toFixed(6)}\t|\t${db.toFixed(6)}\n`;
  });

  const txtBlob = new Blob([txt], { type: "text/plain" });
  const txtA = document.createElement("a");
  txtA.href = URL.createObjectURL(txtBlob);
  txtA.download = file.name.replace(/\.txt$/i, "_smoothed.txt");
  txtA.click();

  // Generate PNG visualization
  status.textContent = "Generating visualization…";

  const nyquist = Math.round(result[result.length - 1].hz);
  const base = document.createElement("canvas");
  base.width = 1;
  base.height = nyquist + 1;

  const bctx = base.getContext("2d");
  const img = bctx.createImageData(1, base.height);
  const cmap = colormaps[cmapSel.value];

  // Find max for normalization
  const maxDb = Math.max(...result.map(d => d.db));

  // Build lookup map
  const dbMap = new Map();
  result.forEach(({ hz, db }) => {
    dbMap.set(Math.round(hz), db);
  });

  for (let y = 0; y <= nyquist; y++) {
    const idx = (nyquist - y) * 4;
    const db = dbMap.has(y) ? dbMap.get(y) : -120;
    const normalized = db - maxDb;
    const v = Math.max(0, Math.min(1, (normalized + 120) / 120));
    const [r, g, b] = cmap(v);

    img.data[idx] = Math.round(255 * r);
    img.data[idx + 1] = Math.round(255 * g);
    img.data[idx + 2] = Math.round(255 * b);
    img.data[idx + 3] = 255;
  }
  bctx.putImageData(img, 0, 0);

  // Stretched display
  const vis = document.createElement("canvas");
  vis.width = wrap.clientWidth || 900;
  vis.height = Math.min(base.height, 500);

  const vctx = vis.getContext("2d");
  vctx.imageSmoothingEnabled = false;
  vctx.drawImage(base, 0, 0, vis.width, vis.height);

  wrap.appendChild(vis);

  status.textContent = "Done.";
  statsDiv.style.display = "block";
  statsDiv.innerHTML = `
    <strong>Smoothing complete</strong><br>
    Total points: ${data.length}<br>
    Points interpolated: ${totalSmoothed}<br>
    Iterations: ${iterations}<br>
  `;
});
</script>
</body>
</html>
